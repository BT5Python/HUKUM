<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>evolution is my revolution - Login Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* VIDEO */
video#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* KONTEN */
.content{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:450px;
text-align:center;
font-family:Courier New;
color:white;
}

h1{
font-size:2em;
margin-bottom:25px;
text-shadow:0 0 8px #00ff00;
line-height:.5;
}

form{
display:flex;
flex-direction:column;
gap:12px;
}

input{
width:100%;
padding:12px;
border:1px solid #00ff00;
border-radius:6px;
background:rgba(0,0,0,.3);
color:white;
font-size:1em;
text-align:center;
outline:none;
}

input::placeholder{
color:#ccc;
}

button{
width:100%;
padding:12px;
background:#00ff00;
color:black;
border:none;
border-radius:6px;
font-size:1em;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00cc00;
box-shadow:0 0 12px #00ff00;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video
id="bg-video"
autoplay
muted
loop
playsinline>

<source
src="Desain tanpa judul (2).mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<!-- AUDIO -->
<audio autoplay loop>

<source
src="Helloween-Forever-And-One-Neverland.aac"
type="audio/mpeg">

</audio>

<!-- LOGIN -->

<div class="content">

<h1>HUKUM</h1>
<h1>PUSLAT KODIKLATAU</h1>

<form
onsubmit="return loginSuccess(event)">

<input
type="email"
name="email"
placeholder="Email"
required
autocomplete="off">

<input
type="password"
name="password"
placeholder="Password"
required
autocomplete="off">

<button type="submit">

LOGIN

</button>

</form>

</div>

<!-- FULLSCREEN -->

<script>

function forceFullscreen(){

const elem=
document.documentElement;

if(
elem.requestFullscreen
){

elem.requestFullscreen()
.catch(()=>{});

}

}

function isStandalone(){

return(

window.matchMedia(
"(display-mode: standalone)"
).matches ||

window.navigator.standalone===true

);

}

if(
isStandalone()
){

setTimeout(
forceFullscreen,
500
);

}

if(

navigator.userAgent
.includes("wv")

||

navigator.userAgent
.includes("Android")

){

setTimeout(
forceFullscreen,
800
);

}

document.addEventListener(

"click",

function(){

forceFullscreen();

},

{
once:true
}

);

</script>

<!-- FIREBASE -->

<script type="module">

import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs0oYCUVRRXyRNX4oQ962_vjzm9ipNfb0",
  authDomain: "progar-upload.firebaseapp.com",
  projectId: "progar-upload",
  storageBucket: "progar-upload.firebasestorage.app",
  messagingSenderId: "254271134587",
  appId: "1:254271134587:web:39207108f7a1802ec3fbde",
  measurementId: "G-L213D6X544"
};
const app=
initializeApp(
firebaseConfig
);

const auth=
getAuth(
app
);

window.loginSuccess=

async function(
event
){

event.preventDefault();

const email=

event.target
.email
.value
.trim();

const password=

event.target
.password
.value
.trim();

try{

await
signInWithEmailAndPassword(

auth,

email,

password

);

window.location.href=

"hukum.html";

}

catch(e){

alert(

e.code+

"\n\n"+

e.message

);

console.log(e);

}

return false;

}

</script>

</body>
</html>
